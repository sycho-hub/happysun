function evalChartSVG(list,highlightIdxs,singleStore){if(!list.length)return'';const W=720,H=170,padL=38,padR=16,padT=18,padB=28,chartW=W-padL-padR,chartH=H-padT-padB;const allMn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];let csLine=[],coLine=[],totLine=[];for(let i=0;i<12;i++){if(singleStore){const d=list[0];const cs=d.cs[i],co=d.co[i];csLine.push(cs);coLine.push(co);totLine.push((cs!==null&&co!==null&&!isNaN(cs)&&!isNaN(co))?Math.round((cs+co)*10)/10:null);}else{const csv=list.map(d=>d.cs[i]).filter(x=>x!==null&&!isNaN(x));const cov=list.map(d=>d.co[i]).filter(x=>x!==null&&!isNaN(x));const cs=csv.length?Math.round(csv.reduce((a,b)=>a+b,0)/csv.length*10)/10:null;const co=cov.length?Math.round(cov.reduce((a,b)=>a+b,0)/cov.length*10)/10:null;csLine.push(cs);coLine.push(co);totLine.push((cs!==null&&co!==null)?Math.round((cs+co)*10)/10:null);}}function xPos(j){return padL+j*chartW/11;}function yPos(v){return v===null?null:padT+chartH*(1-v/100);}function pathLine(vals,color,sw){const segs=[];let seg=[];vals.forEach((v,j)=>{if(v===null||isNaN(v)){if(seg.length){segs.push(seg);seg=[];}return;}seg.push([xPos(j),yPos(v)]);});if(seg.length)segs.push(seg);return segs.map(s=>{if(s.length<2)return'<circle cx="'+s[0][0].toFixed(1)+'" cy="'+s[0][1].toFixed(1)+'" r="3.5" fill="'+color+'" stroke="#fff" stroke-width="1.5"/>';return'<path d="M'+s.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L')+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linejoin="round" stroke-linecap="round"/>';}).join('');}function dotsF(vals,color){return vals.map((v,j)=>{if(v===null||isNaN(v))return'';return'<circle cx="'+xPos(j).toFixed(1)+'" cy="'+yPos(v).toFixed(1)+'" r="3.5" fill="'+color+'" stroke="#fff" stroke-width="1.5"/>';}).join('');}function labelsF(vals,color){return vals.map((v,j)=>{if(v===null||isNaN(v))return'';const x=xPos(j),y=yPos(v);return'<text x="'+x.toFixed(1)+'" y="'+Math.max(padT+9,y-6).toFixed(1)+'" text-anchor="middle" font-size="9" fill="'+color+'" font-weight="700">'+v+'</text>';}).join('');}const hSet=new Set(highlightIdxs);let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px">';if(highlightIdxs.length<12&&highlightIdxs.length>0){let st=-1;for(let i=0;i<=12;i++){if(i<12&&hSet.has(i)){if(st===-1)st=i;}else if(st!==-1){const x1=Math.max(padL,xPos(st)-7),x2=Math.min(W-padR,xPos(i-1)+7);svg+='<rect x="'+x1.toFixed(1)+'" y="'+padT+'" width="'+(x2-x1).toFixed(1)+'" height="'+chartH+'" fill="#e8f0ff" rx="4"/>';st=-1;}}}[0,20,40,60,80,100].forEach(v=>{const y=yPos(v).toFixed(1);svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#e8ecf0" stroke-width="1"/>';svg+='<text x="'+(padL-4)+'" y="'+(parseFloat(y)+3).toFixed(1)+'" text-anchor="end" font-size="9" fill="#adb5bd">'+v+'</text>';});allMn.forEach((mn,j)=>{const x=xPos(j);const fc=hSet.has(j)?'#1a3a6b':'#adb5bd';const fw=hSet.has(j)?'700':'400';svg+='<text x="'+x.toFixed(1)+'" y="'+(padT+chartH+14).toFixed(1)+'" text-anchor="middle" font-size="10" fill="'+fc+'" font-weight="'+fw+'">'+mn+'</text>';});svg+=pathLine(totLine,'#1a3a6b',2.5)+pathLine(csLine,'#3b82f6',1.8)+pathLine(coLine,'#10b981',1.8);svg+=dotsF(totLine,'#1a3a6b')+dotsF(csLine,'#3b82f6')+dotsF(coLine,'#10b981');svg+=labelsF(totLine.map((v,i)=>hSet.has(i)?v:null),'#1a3a6b');if(highlightIdxs.length<=3){svg+=labelsF(csLine.map((v,i)=>hSet.has(i)?v:null),'#3b82f6')+labelsF(coLine.map((v,i)=>hSet.has(i)?v:null),'#10b981');}svg+='</svg>';return svg;}

function rbSpec(s,sps){let h='<div class="card"><div class="cardtitle"><div class="cbar"></div>스펙 현장 목록 ('+sps.length+'건)</div>';if(!sps.length){h+='<div class="tempty">등록된 스펙 현장이 없습니다.</div>';}else{h+='<div class="twrap"><table><thead><tr><th>#</th><th>지역</th><th>아파트명</th><th>주소</th><th>입주/만료</th><th>제품명</th><th>납품</th><th>스펙코드</th><th>입주센터</th></tr></thead><tbody>';sps.forEach((p,i)=>{h+='<tr><td>'+(i+1)+'</td><td>'+e(p.region)+'</td><td style="font-weight:600">'+e(p.apt)+'</td><td style="font-size:11px">'+e(p.addr)+'</td><td style="font-size:11px">'+(isSpecExpired(p.period)?'<span class="spec-exp">만료</span> ':'')+e(p.period)+'</td><td style="font-size:11px">'+e(p.product)+'</td><td>'+e(p.supply)+'</td><td style="font-size:11px">'+e(p.specCode)+'</td><td style="font-size:11px">'+e(p.center)+'</td></tr>';});h+='</tbody></table></div>';}h+='</div>';document.getElementById('dp-spec').innerHTML=h;}
function rbTrend(s){let h='<div class="card"><div class="cardtitle"><div class="cbar"></div>월별 동향 이력</div><div class="tg">';TM.forEach(m=>{const v=s[m.k],has=v&&v.trim();h+='<div class="tc"><div class="tcm">'+e(m.l)+'<div class="tdot '+(has?'tdon':'tdoff')+'"></div></div>'+(has?'<div class="tct">'+e(v.trim())+'</div>':'<div class="tce">기록 없음</div>')+'</div>';});h+='</div></div>';document.getElementById('dp-trend').innerHTML=h;}
function rbMgmt(s){let h='<div class="card"><div class="cardtitle"><div class="cbar"></div>관리 사항</div><div class="mg">';h+='<div class="mi"><div class="mil">주요 관리 필요사항</div><div class="miv">'+(s.mgmtNote&&s.mgmtNote.trim()?e(s.mgmtNote.trim()):'<span class="nodata">내용 없음</span>')+'</div></div>';h+='<div class="mi"><div class="mil">관리내용 (영업/CX)</div><div class="miv">'+(s.mgmtContent&&s.mgmtContent.trim()?e(s.mgmtContent.trim()):'<span class="nodata">내용 없음</span>')+'</div></div>';h+='<div class="mi"><div class="mil">영업담당자</div><div class="miv">'+(s.salesPerson&&s.salesPerson.trim()?e(s.salesPerson.trim()):'<span class="nodata">미지정</span>')+'</div></div>';h+='<div class="mi"><div class="mil">영업담당자 의견/요청</div><div class="miv">'+(s.salesOpinion&&s.salesOpinion.trim()?e(s.salesOpinion.trim()):'<span class="nodata">내용 없음</span>')+'</div></div>';h+='</div></div>';document.getElementById('dp-mgmt').innerHTML=h;}
function sd(n){const tabs=['basic','area','spec','trend','mgmt','eval'];tabs.forEach((t,i)=>{document.querySelectorAll('.dtab')[i].classList.toggle('active',t===n);document.getElementById('dp-'+t).classList.toggle('active',t===n);});}
function renderAreaAll(){const g=document.getElementById('aag');g.innerHTML='';const src=curR==='all'?STORE_DATA:STORE_DATA.filter(s=>s.region===curR);src.forEach(s=>{const ai=AREA_DATA.find(a=>a.name&&a.name.trim()===s.name.trim());const z1=ai?ai.zone1:s.area1,z2=ai?ai.zone2:s.area2,z3=ai?ai.zone3:s.area3;const c=document.createElement('div');c.className='acard';let zs='';if(z1&&z1!=='0')zs+='<div class="azr"><span class="aztag t1">1구역</span><span class="aztxt">'+e(z1)+'</span></div>';if(z2&&z2!=='0')zs+='<div class="azr"><span class="aztag t2">2구역</span><span class="aztxt">'+e(z2)+'</span></div>';if(z3&&z3!=='0')zs+='<div class="azr"><span class="aztag t3">3구역</span><span class="aztxt">'+e(z3)+'</span></div>';if(!zs)zs='<div style="color:var(--txtl);font-size:11px">정보 없음</div>';c.innerHTML='<div class="ach"><span class="acn">'+e(s.name)+'</span><span class="acr">'+(RL[s.region]||s.region||'')+'</span></div><div class="acz">'+zs+'</div>';c.onclick=()=>selStore(s);g.appendChild(c);});}
function renderSpecAll(){const sel=document.getElementById('specSF');if(sel.children.length<=1){[...new Set(SPEC_DATA.map(p=>p.store))].sort().forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});}document.getElementById('specSub').textContent='총 '+SPEC_DATA.length+'건';filterSpec();}
function isSpecExpired(period){if(!period)return false;var s=period.trim();if(!s||s==='입주전')return false;var m=s.match(/(\d{2,4})\s*\.\s*(\d{1,2})(?:\s*[.\-]\s*(\d{1,2}))?/);if(!m)return false;var yr=parseInt(m[1],10),mo=parseInt(m[2],10),dy=parseInt(m[3]||'1',10);if(yr<100)yr+=2000;if(yr<2000||yr>2030||mo<1||mo>12)return false;var exp=new Date(yr+3,mo-1,dy);return exp<new Date();}
function filterSpec(){const q=(document.getElementById('specQ').value||'').trim().toLowerCase(),sf=document.getElementById('specSF').value;let src=SPEC_DATA;if(curR!=='all'){const sn=STORE_DATA.filter(s=>s.region===curR).map(s=>s.name);src=src.filter(p=>sn.includes(p.store));}if(sf)src=src.filter(p=>p.store===sf);if(q)src=src.filter(p=>(p.apt||'').toLowerCase().includes(q)||(p.addr||'').toLowerCase().includes(q)||(p.product||'').toLowerCase().includes(q));document.getElementById('sfcnt').textContent='필터결과: '+src.length+'건';const tb=document.getElementById('specBody');tb.innerHTML='';src.forEach((p,i)=>{const tr=document.createElement('tr');tr.innerHTML='<td>'+(i+1)+'</td><td style="font-weight:600;white-space:nowrap">'+e(p.store)+'</td><td>'+e(p.region)+'</td><td style="font-weight:600">'+e(p.apt)+'</td><td style="font-size:11px">'+e(p.addr)+'</td><td style="font-size:11px">'+(isSpecExpired(p.period)?'<span class="spec-exp">만료</span> ':'')+e(p.period)+'</td><td style="font-size:11px">'+e(p.product)+'</td><td>'+e(p.supply)+'</td><td style="font-size:11px">'+e(p.specCode)+'</td><td style="font-size:11px">'+e(p.center)+'</td>';tb.appendChild(tr);});}
document.getElementById('hdrDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
buildRegionList();filterStores();var _si=document.getElementById('si');if(_si)_si.addEventListener('input',filterStores);</script></body></html>
